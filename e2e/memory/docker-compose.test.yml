name: memory-e2e

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: memory_test
      POSTGRES_USER: memory_test
      POSTGRES_PASSWORD: memory_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_test"]
      interval: 2s
      timeout: 3s
      retries: 10
