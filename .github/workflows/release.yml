name: Release

on:
  push:
    tags:
      - "v*"
  # Manual trigger for plugin-only releases where no SDK tag was cut
  # (e.g. bumping the openclaw plugin independently).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: NODE_OPTIONS='--experimental-vm-modules' npx jest --config jest.config.cjs --testPathIgnorePatterns='/e2e/'

      - name: Check if version already on npm
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "Package: $NAME@$VERSION"
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "Already published. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Test
        run: pip install pytest && pip install -e . && pytest python/tests/ -v

      - name: Check if version already on PyPI
        id: check
        run: |
          NAME=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Package: $NAME==$VERSION"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/$NAME/$VERSION/json")
          if [ "$STATUS" = "200" ]; then
            echo "Already published. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-openclaw-plugin:
    name: Publish OpenClaw Plugin to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      # Skip when the version in package.json is already on the registry.
      # Lets this job share the `v*` trigger with the SDK publish without
      # failing on releases where the plugin version didn't change.
      - name: Check if version already on npm
        id: check
        working-directory: packages/memory/openclaw-plugin
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "Plugin: $NAME@$VERSION"
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "Already published. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not published. Will publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/memory/openclaw-plugin
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    # Only on actual tags — skip the auto-release for workflow_dispatch
    # runs (which may be plugin-only with no SDK version bump).
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-npm, publish-pypi, publish-openclaw-plugin]
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
