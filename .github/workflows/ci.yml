name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-js:
    name: JavaScript Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: NODE_OPTIONS='--experimental-vm-modules' npx jest --config jest.config.cjs --testPathIgnorePatterns='/e2e/'

  test-python:
    name: Python Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest

      - name: Test
        run: pytest python/tests/ -v

  plugin-validation:
    name: Plugin Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate plugin structure
        run: |
          NODE_OPTIONS='--experimental-vm-modules' npx jest --config jest.config.cjs __tests__/plugin.test.js __tests__/build.test.js

  memory-e2e:
    name: Memory System E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Start PostgreSQL with pgvector
        run: docker compose -f e2e/memory/docker-compose.test.yml up -d --wait

      - name: Run memory E2E tests
        run: |
          NODE_OPTIONS='--experimental-vm-modules' npx jest --config jest.config.cjs e2e/memory/memory.e2e.test.js --testTimeout=60000
        env:
          DATABASE_URL: postgres://memory_test:memory_test@localhost:5435/memory_test

      - name: Stop PostgreSQL
        if: always()
        run: docker compose -f e2e/memory/docker-compose.test.yml down

  openclaw-e2e:
    name: OpenClaw Plugin E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Start memory stack
        run: docker compose -f e2e/openclaw/docker-compose.test.yml up -d postgres memory-server ollama --wait
        timeout-minutes: 5

      - name: Wait for memory server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3334/health > /dev/null 2>&1; then
              echo "Memory server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Memory server not ready after 60s"
          exit 1

      - name: Run OpenClaw plugin E2E tests
        run: |
          NODE_OPTIONS='--experimental-vm-modules' npx jest --config jest.config.cjs e2e/openclaw/openclaw.e2e.test.js --testTimeout=60000
        env:
          MEMORY_SERVER_URL: http://localhost:3334
          DATABASE_URL: postgres://memory_test:memory_test@localhost:5435/memory_test

      - name: Stop services
        if: always()
        run: docker compose -f e2e/openclaw/docker-compose.test.yml down

  memory-contract:
    name: Memory API Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run contract tests
        run: |
          NODE_OPTIONS='--experimental-vm-modules' npx jest --config jest.config.cjs packages/memory/src/__tests__/api-contract.test.js
